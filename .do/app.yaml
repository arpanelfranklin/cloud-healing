name: selfheal
region: blr

# ── Services ──────────────────────────────────────────────────────────────
services:

  # ── Backend (Node.js + WebSocket) ──────────────────────────────────────
  - name: api
    source_dir: /backend
    github:
      branch: main
      deploy_on_push: true
    build_command: npm install
    run_command: node server.js
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 20
      timeout_seconds: 5
      failure_threshold: 3

    # WebSocket upgrade headers — required for ws:// → wss:// on DO
    cors:
      allow_origins:
        - prefix: https://

    envs:
      - key: PORT
        value: "8000"
        scope: RUN_AND_BUILD_TIME

      # Supabase — set values in DO dashboard (marked SECRET)
      - key: SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      - key: SUPABASE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      # AI — Gemini preferred; falls back to OpenAI; or use mock
      - key: GEMINI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      - key: GEMINI_MODEL
        value: gemini-2.0-flash

      - key: OPENAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      - key: OPENAI_MODEL
        value: gpt-4o-mini

      - key: ALLOW_AI_MOCK
        value: "true"       # flip to false once your API keys have quota

      # CORS — auto-populated with the frontend service's public URL
      - key: FRONTEND_URL
        value: ${selfheal-frontend.PUBLIC_URL}
        scope: RUN_AND_BUILD_TIME

  # ── Frontend (Next.js) ─────────────────────────────────────────────────
  - name: selfheal-frontend
    source_dir: /frontend
    github:
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

    envs:
      # Points the frontend at the backend service — built into the JS bundle
      - key: NEXT_PUBLIC_BACKEND_URL
        value: ${api.PUBLIC_URL}
        scope: BUILD_TIME
